<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Warzone Services — Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root{
  --bg:#070a08; --bg-1:#0c110d; --bg-2:#121a14; --bg-3:#18231b; --bg-input:#0d1410;
  --border:#1e2c22; --border-2:#2c4033;
  --fg:#eaf5ee; --fg-mut:#8fa898; --fg-dim:#5c7365;
  --green:#57f287; --green-2:#2fbf68; --green-dim:rgba(87,242,135,.12); --green-glow:rgba(87,242,135,.3);
  --amber:#f0b232; --amber-dim:rgba(240,178,50,.12);
  --red:#ff5a5f; --red-dim:rgba(255,90,95,.12);
  --blue:#4fa8ff; --blue-dim:rgba(79,168,255,.12);
  --r:12px; --r-lg:16px;
  --shadow:0 12px 40px rgba(0,0,0,.55);
  --tr:.16s ease;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:
  radial-gradient(ellipse at 20% 0%, rgba(87,242,135,.06), transparent 55%),
  radial-gradient(ellipse at 90% 100%, rgba(240,178,50,.05), transparent 50%),
  repeating-linear-gradient(0deg, transparent 0 39px, rgba(87,242,135,.02) 39px 40px)}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:5px}
h1,h2,h3,.brand-font{font-family:'Rajdhani',sans-serif;letter-spacing:.4px;text-transform:uppercase}
input,textarea,select,button{font-family:inherit}
a{color:var(--green);text-decoration:none}
.mono{font-family:'JetBrains Mono',monospace}

/* LOGIN */
.login-screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:1000;background:radial-gradient(circle at center, var(--bg-2), var(--bg))}
.login-card{background:rgba(18,26,20,.85);backdrop-filter:blur(18px);border:1px solid var(--border-2);border-radius:20px;padding:46px 42px;width:430px;max-width:92vw;box-shadow:var(--shadow),0 0 60px rgba(87,242,135,.08);animation:up .5s ease}
.login-logo{width:74px;height:74px;margin:0 auto 18px;border-radius:16px;background:linear-gradient(135deg,var(--green-2),#0d3320);display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 8px 26px var(--green-glow)}
.login-title{text-align:center;font-size:28px;font-weight:700;color:var(--green)}
.login-sub{text-align:center;color:var(--fg-mut);font-size:12px;margin-bottom:28px;letter-spacing:2px;text-transform:uppercase}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;color:var(--fg-mut);margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:.8px}
.field input,.field textarea,.field select{width:100%;background:var(--bg-input);border:1px solid var(--border);border-radius:9px;padding:11px 13px;color:var(--fg);font-size:13.5px;outline:none;transition:var(--tr)}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--green-2);box-shadow:0 0 0 3px var(--green-dim)}
.field textarea{min-height:80px;resize:vertical}
.btn-login{width:100%;background:linear-gradient(135deg,var(--green-2),#1a8a4a);color:#03130a;border:none;padding:13px;border-radius:9px;font-size:14px;font-weight:800;cursor:pointer;transition:var(--tr);box-shadow:0 4px 18px var(--green-glow);font-family:'Rajdhani';text-transform:uppercase;letter-spacing:1px}
.btn-login:hover{transform:translateY(-2px)}
.login-error{color:var(--red);font-size:13px;text-align:center;margin-top:12px;min-height:18px}
@keyframes up{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes fade{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden;position:relative;z-index:1}
.sidebar{width:236px;background:rgba(10,15,11,.92);backdrop-filter:blur(16px);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.side-head{padding:20px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.side-logo{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--green-2),#0d3320);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0;box-shadow:0 4px 14px var(--green-glow)}
.side-brand h1{font-size:17px;font-weight:700;color:var(--green);line-height:1.1}
.side-brand span{font-size:10px;color:var(--fg-mut);letter-spacing:1.6px;text-transform:uppercase}
.side-nav{flex:1;padding:12px 10px;overflow-y:auto}
.nav-sec{font-size:10px;color:var(--fg-dim);text-transform:uppercase;letter-spacing:1.6px;padding:12px 12px 5px;font-weight:700}
.nav-it{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:9px;color:var(--fg-mut);font-size:13.5px;font-weight:500;cursor:pointer;transition:var(--tr);margin-bottom:2px;user-select:none}
.nav-it:hover{background:var(--bg-2);color:var(--fg)}
.nav-it.active{background:linear-gradient(90deg,var(--green-dim),transparent);color:var(--green);box-shadow:inset 3px 0 0 var(--green)}
.nav-it i{width:17px;text-align:center;font-size:13px}
.nav-it .badge{margin-left:auto;background:var(--amber);color:#000;font-size:10px;font-weight:800;padding:1px 7px;border-radius:8px}
.side-foot{padding:12px;border-top:1px solid var(--border)}
.bot-chip{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--bg-2);border-radius:9px;font-size:12px}
.bot-chip .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite}
.bot-chip .dot.off{background:var(--red);box-shadow:0 0 8px var(--red)}
.btn-out{width:100%;background:var(--bg-2);border:1px solid var(--border);color:var(--fg-mut);padding:8px;border-radius:8px;font-size:12px;cursor:pointer;margin-top:8px;transition:var(--tr)}
.btn-out:hover{background:var(--red-dim);color:var(--red);border-color:var(--red)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:60px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;background:rgba(10,15,11,.8);backdrop-filter:blur(14px);gap:14px}
.topbar h2{font-size:19px;font-weight:700;flex:1;color:var(--fg)}
.content{flex:1;overflow-y:auto;padding:22px}

/* COMPONENTS */
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--bg-2);border:1px solid var(--border-2);color:var(--fg);padding:9px 15px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;transition:var(--tr)}
.btn:hover{background:var(--bg-3);border-color:var(--green-2)}
.btn-primary{background:linear-gradient(135deg,var(--green-2),#1a8a4a);border:none;color:#03130a;font-weight:800;box-shadow:0 4px 14px var(--green-glow)}
.btn-primary:hover{transform:translateY(-1px)}
.btn-danger{background:var(--red-dim);border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-success{background:var(--green-dim);border-color:var(--green-2);color:var(--green)}
.btn-success:hover{background:var(--green-2);color:#03130a}
.btn-warn{background:var(--amber-dim);border-color:var(--amber);color:var(--amber)}
.btn-sm{padding:6px 11px;font-size:12px;border-radius:8px}
.card{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;margin-bottom:16px}
.card h3{font-size:14px;font-weight:700;margin-bottom:13px;display:flex;align-items:center;gap:9px;color:var(--fg)}
.card h3 i{color:var(--green)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:20px}
.stat{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--r-lg);padding:17px;position:relative;overflow:hidden;transition:var(--tr)}
.stat:hover{transform:translateY(-2px);border-color:var(--border-2)}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--green)}
.stat.amber::before{background:var(--amber)}
.stat.red::before{background:var(--red)}
.stat.blue::before{background:var(--blue)}
.stat .lb{font-size:10.5px;color:var(--fg-mut);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:7px;font-weight:700}
.stat .vl{font-size:26px;font-weight:800;font-family:'Rajdhani'}
.stat .sb{font-size:11px;color:var(--fg-dim);margin-top:3px}
.stat .ic{position:absolute;top:15px;right:15px;width:36px;height:36px;border-radius:10px;background:var(--green-dim);color:var(--green);display:flex;align-items:center;justify-content:center;font-size:16px}
.stat.amber .ic{background:var(--amber-dim);color:var(--amber)}
.stat.red .ic{background:var(--red-dim);color:var(--red)}
.stat.blue .ic{background:var(--blue-dim);color:var(--blue)}
.tag{display:inline-flex;align-items:center;padding:3px 10px;border-radius:14px;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.6px}
.tag.g{background:var(--green-dim);color:var(--green)}
.tag.a{background:var(--amber-dim);color:var(--amber)}
.tag.r{background:var(--red-dim);color:var(--red)}
.tag.b{background:var(--blue-dim);color:var(--blue)}
.tag.mut{background:#20281f;color:var(--fg-mut)}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:10.5px;color:var(--fg-mut);text-transform:uppercase;letter-spacing:1px;padding:9px 11px;border-bottom:1px solid var(--border);font-weight:700}
.tbl td{padding:11px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.tbl tr:hover td{background:var(--bg-2)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:13px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px;margin-bottom:13px}
.svc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.svc-card{background:var(--bg-1);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;transition:var(--tr)}
.svc-card:hover{border-color:var(--green-2);transform:translateY(-3px);box-shadow:var(--shadow)}
.svc-head{padding:15px 15px 0;display:flex;align-items:center;gap:10px}
.svc-emoji{width:44px;height:44px;border-radius:11px;background:var(--bg-3);display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.svc-head h4{font-size:14.5px;font-weight:700;line-height:1.25}
.svc-body{padding:11px 15px 14px}
.svc-desc{font-size:12px;color:var(--fg-mut);margin-bottom:9px;min-height:30px}
.svc-meta{display:flex;gap:10px;flex-wrap:wrap;font-size:11.5px;color:var(--fg-mut)}
.svc-price{font-size:19px;font-weight:800;color:var(--amber);font-family:'Rajdhani';margin:7px 0 2px}
.svc-actions{display:flex;gap:6px;padding:0 15px 15px}
.svc-actions .btn{flex:1;justify-content:center;font-size:11.5px;padding:7px 6px}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(5px);z-index:500;display:none;align-items:center;justify-content:center;padding:18px}
.modal-ov.show{display:flex;animation:fade .18s ease}
.modal{background:var(--bg-1);border:1px solid var(--border-2);border-radius:var(--r-lg);width:94%;max-width:640px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow);animation:up .25s ease}
.modal-h{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;position:sticky;top:0;background:var(--bg-1);z-index:5}
.modal-h h3{font-size:16px;font-weight:700;flex:1}
.modal-h .x{background:none;border:none;color:var(--fg-mut);font-size:22px;cursor:pointer;width:30px;height:30px;border-radius:7px}
.modal-h .x:hover{background:var(--bg-2);color:var(--fg)}
.modal-b{padding:20px}
.modal-f{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--bg-1)}
.toasts{position:fixed;top:18px;right:18px;z-index:2000;display:flex;flex-direction:column;gap:9px}
.toast{background:var(--bg-1);border:1px solid var(--border-2);border-left:4px solid var(--green);padding:13px 16px;border-radius:10px;box-shadow:var(--shadow);min-width:260px;max-width:380px;display:flex;align-items:center;gap:11px;animation:up .25s ease;font-size:13px}
.toast.err{border-left-color:var(--red)}
.toast.warn{border-left-color:var(--amber)}
.toast i{font-size:16px}
.toast.ok i{color:var(--green)}.toast.err i{color:var(--red)}.toast.warn i{color:var(--amber)}
.empty{text-align:center;padding:44px 18px;color:var(--fg-mut)}
.empty i{font-size:42px;margin-bottom:11px;color:var(--fg-dim);display:block}
.page{display:none;animation:fade .25s ease}
.page.active{display:block}
.page-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.page-h h2{font-size:21px;font-weight:700}
.page-h p{color:var(--fg-mut);font-size:12.5px;margin-top:2px;font-family:'Inter';text-transform:none;letter-spacing:0}
.chart-wrap{height:210px;display:flex;align-items:flex-end;gap:4px;padding-bottom:6px}
.cbar{flex:1;background:linear-gradient(180deg,var(--green),var(--green-2));border-radius:4px 4px 0 0;min-height:2px;position:relative;cursor:pointer;transition:var(--tr)}
.cbar:hover{filter:brightness(1.35)}
.cbar .tip{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:var(--bg);border:1px solid var(--border-2);padding:4px 8px;border-radius:6px;font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;margin-bottom:5px;transition:var(--tr)}
.cbar:hover .tip{opacity:1}
.chart-lbls{display:flex;gap:4px}
.chart-lbls span{flex:1;text-align:center;font-size:9.5px;color:var(--fg-dim)}
.check-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px}
.hidden{display:none!important}
.mut{color:var(--fg-mut)}.xs{font-size:11px}.sm{font-size:12px}
.mt2{margin-top:8px}.mt3{margin-top:12px}.mb2{margin-bottom:8px}.mb3{margin-bottom:12px}
.flex{display:flex}.g2{gap:8px}.wrap{flex-wrap:wrap}.ac{align-items:center}
@media(max-width:900px){.sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;transform:translateX(-100%)}.sidebar.open{transform:none}.row2,.row3{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🎯</div>
    <div class="login-title">Warzone Services</div>
    <div class="login-sub">Command Center</div>
    <form onsubmit="return doLogin(event)">
      <div class="field">
        <label>Panel Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="loginBtn"><i class="fa-solid fa-shield-halved"></i> Enter Command Center</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>
</div>

<div class="app" id="app" style="display:none">
  <aside class="sidebar" id="sidebar">
    <div class="side-head">
      <div class="side-logo">🎯</div>
      <div class="side-brand"><h1>WZ Services</h1><span>Command Center</span></div>
    </div>
    <nav class="side-nav">
      <div class="nav-sec">Overview</div>
      <div class="nav-it active" data-page="dashboard"><i class="fa-solid fa-gauge-high"></i> Dashboard</div>
      <div class="nav-sec">Store</div>
      <div class="nav-it" data-page="services"><i class="fa-solid fa-crosshairs"></i> Services</div>
      <div class="nav-it" data-page="coupons"><i class="fa-solid fa-tag"></i> Coupons</div>
      <div class="nav-sec">Sales</div>
      <div class="nav-it" data-page="payments"><i class="fa-solid fa-money-bill-wave"></i> Payments <span class="badge" id="payBadge" style="display:none">0</span></div>
      <div class="nav-it" data-page="tickets"><i class="fa-solid fa-ticket"></i> Tickets <span class="badge" id="tickBadge" style="display:none">0</span></div>
      <div class="nav-it" data-page="orders"><i class="fa-solid fa-receipt"></i> Orders</div>
      <div class="nav-it" data-page="customers"><i class="fa-solid fa-users"></i> Customers</div>
      <div class="nav-sec">System</div>
      <div class="nav-it" data-page="setup"><i class="fa-solid fa-wand-magic-sparkles"></i> Server Setup</div>
      <div class="nav-it" data-page="settings"><i class="fa-solid fa-gear"></i> Settings</div>
      <div class="nav-it" data-page="logs"><i class="fa-solid fa-list"></i> Logs</div>
    </nav>
    <div class="side-foot">
      <div class="bot-chip"><div class="dot" id="botDot"></div><div><b id="botTxt" style="font-size:12px">Connecting…</b><div class="xs mut">Discord Bot</div></div></div>
      <button class="btn-out" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> Logout</button>
    </div>
  </aside>
  <div class="main">
    <header class="topbar">
      <h2 id="pageTitle">Dashboard</h2>
      <button class="btn btn-sm" onclick="refreshAll(true)"><i class="fa-solid fa-rotate"></i> Refresh</button>
      <button class="btn btn-primary btn-sm" onclick="openServiceModal()"><i class="fa-solid fa-plus"></i> New Service</button>
    </header>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="modal-ov" id="modalOv"><div class="modal" id="modal"></div></div>
<div class="toasts" id="toasts"></div>
<script>
// ===== Warzone Services — Command Center logic =====
const API = '/api';
let SESSION = localStorage.getItem('wz_session') || '';
let PAGE = 'dashboard';
let C = { stats:{}, services:[], orders:[], payments:[], tickets:[], customers:[], coupons:[], settings:{}, logs:[], guilds:[] };
let _modalOpen = false, _typing = false;

const KIND_INFO = {
  ladder: { emoji:'🏆', label:'Rank Boost (ladder)', hint:'Buyer picks current → target rank; price per tier.' },
  multi: { emoji:'🔫', label:'Multi-Select (guns / camos)', hint:'Buyer multi-selects items; prices add up.' },
  package: { emoji:'📦', label:'Packages (wins / kills / nuke / levels)', hint:'Buyer multi-selects fixed packages.' }
};
const WZ_RANKS_TEXT = '🥉 Bronze\n🥈 Silver\n🥇 Gold\n💠 Platinum\n💎 Diamond\n🔴 Crimson\n🟣 Iridescent\n👑 Top 250';
const GUNS_PRESET = ['# 🔫 Assault Rifles','🔫 AK-27:13','🔫 M15 MOD 0:13','🔫 MXR-17:13','🔫 X9 Maverick:13','🔫 Peacemaker MK1:13','# 💨 SMGs','💨 Dravec 45:11','💨 Kogot-7:11','💨 VX Compact:11','💨 C9:11','# 🎯 Snipers & Marksman','🎯 LW3I Tundra:12','🎯 HDR:12','🎯 KRS-7.62:12','# ⛓️ LMGs & Shotguns','⛓️ GPMG-7:12','⛓️ BRUEN MK9:12','💥 Marine Breacher:12'].join('\n');
const CAMOS_PRESET = ['# 🎨 Mastery Camos','🔥 Molten Gold:12','⚡ Arclight:15','🌀 Void Stripe:20','💎 Diamond:25','🌌 Singularity:30','🌋 Apocalypse:28','🌑 Dark Matter:35'].join('\n');
const GUNPICK_PRESET = ['🔫 AK-27','🔫 M15 MOD 0','🔫 MXR-17','💨 Dravec 45','💨 Kogot-7','🎯 LW3I Tundra','🎯 HDR'].join('\n');

// ===== AUTH & API =====
async function api(ep, opts={}) {
  const r = await fetch(API + '/' + ep, { ...opts, headers: { 'Content-Type':'application/json', 'x-session': SESSION, ...(opts.headers||{}) } });
  if (r.status === 401) { showLogin(); throw new Error('Unauthorized'); }
  const text = await r.text();
  let data; try { data = JSON.parse(text); } catch { data = text; }
  if (!r.ok) throw new Error((data && data.error) || ('Request failed (' + r.status + ')'));
  return data;
}
async function checkAuth() {
  if (!SESSION) return showLogin();
  try { const r = await api('check-auth'); r.authenticated ? showApp() : showLogin(); }
  catch { showLogin(); }
}
function showLogin(){ document.getElementById('loginScreen').style.display='flex'; document.getElementById('app').style.display='none'; }
function showApp(){ document.getElementById('loginScreen').style.display='none'; document.getElementById('app').style.display='flex'; refreshAll(true); if (window._poll) clearInterval(window._poll); window._poll = setInterval(pollBadges, 20000); }
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  try {
    const r = await fetch(API + '/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ password: document.getElementById('loginPassword').value }) });
    const d = await r.json();
    if (r.ok && d.token) { SESSION = d.token; localStorage.setItem('wz_session', SESSION); document.getElementById('loginError').textContent=''; showApp(); toast('ok','Welcome back, commander!'); }
    else document.getElementById('loginError').textContent = d.error || 'Login failed';
  } catch { document.getElementById('loginError').textContent = 'Connection error'; }
  btn.disabled = false;
  return false;
}

// ===== HELPERS =====
function toast(type,msg){
  const t=document.createElement('div');
  t.className='toast '+type;
  const ic={ok:'fa-circle-check',err:'fa-circle-xmark',warn:'fa-triangle-exclamation'}[type]||'fa-circle-info';
  t.innerHTML=`<i class="fa-solid ${ic}"></i><div>${msg}</div>`;
  document.getElementById('toasts').appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)},3800);
}
function esc(s){ if(s==null)return''; return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]); }
function val(id){ return (document.getElementById(id)?.value||'').trim(); }
function emojiStr(e){ if(!e)return''; if(typeof e==='object')return '<:'+e.name+':'+e.id+'>'; return e; }
function cur(){ return C.settings.currency || '$'; }
function startPrice(svc){
  const cfg=svc.config||{};
  if(svc.kind==='ladder')return cfg.pricePerTier||0;
  if(svc.kind==='multi'){const ps=(cfg.categories||[]).flatMap(c=>c.items).map(i=>i.price!=null?i.price:cfg.defaultPrice||0).filter(p=>p>0);return ps.length?Math.min(...ps):(cfg.defaultPrice||0);}
  if(svc.kind==='package'){const ps=(cfg.packages||[]).map(p=>p.price||0).filter(p=>p>0);return ps.length?Math.min(...ps):0;}
  return 0;
}
function showModal(html){ document.getElementById('modal').innerHTML=html; document.getElementById('modalOv').classList.add('show'); _modalOpen=true; }
function closeModal(){ document.getElementById('modalOv').classList.remove('show'); _modalOpen=false; refreshAll(true); }
document.getElementById('modalOv').addEventListener('click',e=>{ if(e.target.id==='modalOv') closeModal(); });
document.addEventListener('focusin',e=>{ if(['input','textarea','select'].includes((e.target.tagName||'').toLowerCase())) _typing=true; });
document.addEventListener('focusout',()=>{ setTimeout(()=>{ const a=(document.activeElement?.tagName||'').toLowerCase(); if(!['input','textarea','select'].includes(a)) _typing=false; },200); });

async function refreshAll(force){
  try{
    const [stats,services,orders,payments,tickets,customers,coupons,settings,logs,guilds] = await Promise.all([
      api('stats'),api('services'),api('orders'),api('payments'),api('tickets'),api('customers'),api('coupons'),api('settings'),api('logs'),api('guilds').catch(()=>[])
    ]);
    C={stats,services,orders,payments,tickets,customers,coupons,settings,logs,guilds};
    paintBadges();
    if(force && !_modalOpen && !_typing) renderPage();
  }catch(e){ if(e.message==='Unauthorized') showLogin(); }
}
async function pollBadges(){ if(_modalOpen||_typing)return; try{ C.stats=await api('stats'); paintBadges(); }catch(e){} }
function paintBadges(){
  const s=C.stats||{};

  if(s.botOnline){dot.classList.remove('off');txt.textContent='Bot Online';}else{dot.classList.add('off');txt.textContent='Bot Offline';}

function toggleSvcFields(){

}
async function saveService(id){
  const kind=id?(C.services.find(s=>s.id===id)||{}).kind:val('sv_kind');
  let image=window._svcImage||null;
  const file=document.getElementById('sv_img').files[0];
  if(file) image=await new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(file);});
  const config={};
  if(kind==='ladder'){
    config.ranks=val('sv_ranks')?document.getElementById('sv_ranks').value:'';
    config.tiersPerRank=parseInt(val('sv_tiers'))||3;
    config.pricePerTier=parseFloat(val('sv_ppt'))||0;
    if(!config.pricePerTier)return toast('err','Set a price per tier');
  } else if(kind==='multi'){
    config.categories=document.getElementById('sv_items').value;
    config.defaultPrice=parseFloat(val('sv_defp'))||0;
    config.gunPick=document.getElementById('sv_gunpick').value;
    if(!config.categories.trim())return toast('err','Add at least one item');
  } else {
    syncPkgRows();
    config.packages=window._pkgRows.filter(p=>(p.name||'').trim()).map(p=>({emoji:p.emoji,name:p.name,price:parseFloat(p.price)||0,note:p.note}));
    if(!config.packages.length)return toast('err','Add at least one package');
  }
  const data={name:val('sv_name'),kind,description:val('sv_desc'),eta:val('sv_eta')||'24-48 hours',image,config};
  if(!data.name)return toast('err','Service name required');
  try{
    if(id){await api('services/'+id,{method:'PUT',body:JSON.stringify(data)});toast('ok','Service updated — use ↻ to re-post the Discord message');}
    else{await api('services',{method:'POST',body:JSON.stringify(data)});toast('ok','Service created'+(C.stats.botOnline?' & posted to Discord':''));}
    closeModal();
  }catch(e){toast('err',e.message);}
}
async function deleteService(id){ if(!confirm('Delete this service? Its Discord post is removed too.'))return; try{await api('services/'+id,{method:'DELETE'});toast('ok','Deleted');refreshAll(true);}catch(e){toast('err',e.message);} }

async function refundOrder(id){ if(!confirm('Mark this order refunded?'))return; try{await api('orders/'+id+'/refund',{method:'POST'});toast('ok','Refunded');refreshAll(true);}catch(e){toast('err',e.message);} }
function exportCsv(){
  const list=C.orders||[]; if(!list.length)return toast('warn','No orders to export');
  const e2=v=>'"'+String(v==null?'':v).replace(/"/g,'""')+'"';
  const rows=[['Order','Customer','Discord ID','Service','Amount','Original','Coupon','Method','Date','Status']];
  list.forEach(o=>rows.push([o.id,o.cust,o.custId,o.item,o.amount,o.originalAmount||o.amount,o.couponCode||'',o.paymentMethod||'',o.date||'',o.status]));
  const blob=new Blob(['﻿'+rows.map(r=>r.map(e2).join(',')).join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='wz-orders-'+new Date().toISOString().slice(0,10)+'.csv'; a.click(); URL.revokeObjectURL(a.href);
}

    payments:{stcPay:{number:val('st_stc'),name:val('st_stcn')},alrajhi:{iban:val('st_iban'),name:val('st_ibn')},paypal:{email:val('st_pp'),name:val('st_ppn')}},

async function restoreBackup(e){
  const f=e.target.files[0]; if(!f)return;
  if(!confirm('Restore from backup? Current data is replaced.'))return;
  try{const d=JSON.parse(await f.text());await api('restore',{method:'POST',body:JSON.stringify(d)});toast('ok','Backup restored');refreshAll(true);}catch{toast('err','Invalid backup file');}
}

// ===== LOGS =====
function rLogs(c){
  const logs=C.logs||[];
  c.innerHTML=`<div class="page active">
    <div class="page-h"><div><h2>Logs</h2><p>${logs.length} entries</p></div>
      <button class="btn btn-danger" onclick="clearLogs()"><i class="fa-solid fa-trash"></i> Clear</button></div>
    <div class="card">${logs.length===0?'<div class="empty"><i class="fa-solid fa-list"></i><p>No logs yet</p></div>':
      logs.map(l=>`<div class="check-row"><span class="mono xs mut" style="flex:0 0 140px">${new Date(l.time).toLocaleString()}</span>
      <span class="tag ${l.level==='ERROR'?'r':l.level==='WARN'?'a':'g'}" style="flex:0 0 62px;justify-content:center">${l.level}</span>
      <span style="flex:1" class="sm">${esc(l.msg)}</span></div>`).join('')}</div>
  </div>`;
}
async function clearLogs(){ if(!confirm('Clear all logs?'))return; try{await api('logs',{method:'DELETE'});toast('ok','Cleared');refreshAll(true);}catch(e){toast('err',e.message);} }

// ===== INIT =====
window.addEventListener('DOMContentLoaded', checkAuth);
</script>
</body>
